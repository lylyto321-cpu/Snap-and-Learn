<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Snap &amp; Learn</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#0D9488;--accent-light:#F0FDFA;--accent-dark:#0F766E;
  --orange:#F59E0B;--orange-light:#FFFBEB;
  --bg:#F8FAFB;--card:#fff;--text:#1E293B;--text2:#64748B;--text3:#94A3B8;
  --border:#E2E8F0;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 4px 24px rgba(0,0,0,.08),0 8px 48px rgba(0,0,0,.06);
  --radius:14px;
  --nav-h:56px;--topbar-h:52px;--bottombar-h:56px;
  --ease:cubic-bezier(.4,0,.2,1);
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}

html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
  height:100dvh;
}

/* App root — fills full height with safe-area padding at top */
#appRoot{
  display:flex;
  flex-direction:column;
  flex:1;
  overflow:hidden;
  padding-top:var(--sat);
}

/* App container — all screens live here, fills between top-bar and bottom-nav */
.app-container{
  flex:1;
  overflow:hidden;
  position:relative;
}

/* Screens */
.app-screen{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);transition:transform .3s var(--ease),opacity .3s var(--ease);will-change:transform,opacity}
.app-screen.hidden{display:none}
.app-screen.slide-left{transform:translateX(-100%);opacity:0}
.app-screen.slide-right{transform:translateX(100%);opacity:0}

/* Top bar */
.top-bar{height:var(--topbar-h);background:#fff;display:flex;align-items:center;padding:0 20px;font-size:17px;font-weight:700;letter-spacing:-.2px;position:sticky;top:0;z-index:40;border-bottom:1px solid rgba(0,0,0,.06)}
.top-bar .actions{margin-left:auto;display:flex;gap:8px}
.top-bar .icon-btn,.icon-btn{width:36px;height:36px;border:none;background:transparent;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s var(--ease)}
.top-bar .icon-btn:hover,.icon-btn:hover{background:var(--accent-light)}

/* Bottom nav — safe area padding for Android home indicator */
.bottom-nav{
  height:calc(var(--bottombar-h) + var(--sab));
  padding-bottom:var(--sab);
  background:#fff;
  display:flex;
  border-top:1px solid rgba(0,0,0,.06);
  z-index:50;
  flex-shrink:0;
}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;font-size:10px;font-weight:500;letter-spacing:.2px;color:var(--text3);transition:all .2s var(--ease);-webkit-tap-highlight-color:transparent;position:relative}
.nav-tab.active{color:var(--accent);font-weight:600}
.nav-tab.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
.nav-tab .nav-icon{font-size:22px;display:flex;align-items:center;justify-content:center;height:22px}

/* Upload screen */
.upload-zone{margin:20px 16px;border:2px dashed var(--border);border-radius:20px;padding:48px 24px;text-align:center;transition:all .25s var(--ease);min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(255,255,255,.5)}
.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-light);transform:scale(1.01)}
.upload-zone .upload-icon{opacity:.35;color:var(--text2)}
.upload-zone p{color:var(--text2);font-size:14px;font-weight:400}
.upload-zone.processing .upload-icon{display:none}
.upload-native-btns{display:flex;gap:12px;margin-top:4px;flex-wrap:wrap;justify-content:center}

/* Image annotation — fixed overlay covering entire viewport */
.image-annotation{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;z-index:999}
.annot-topbar{display:flex;align-items:center;justify-content:center;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));border-bottom:1px solid var(--border);flex-shrink:0;background:#fff}
.annot-label{font-size:14px;font-weight:600;color:var(--text1);text-align:center}
.annotation-canvas-wrap{flex:1 1 0;min-height:0;display:flex;align-items:center;justify-content:center;background:#f1f5f9;overflow:hidden;padding:8px}
.annotation-canvas-wrap canvas{display:block;max-width:100%;max-height:100%;cursor:crosshair;touch-action:none}
.annotation-bottom{flex-shrink:0;padding:16px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;background:#fff;border-top:1px solid var(--border)}
.annot-progress{font-size:13px;color:var(--text3);text-align:center}
.annot-btn-row{display:flex;gap:10px}
.annot-btn-row .btn{flex:1;padding:13px;font-size:15px;font-weight:600;border-radius:14px}

.word-select{padding:20px}
.word-select h4{font-size:14px;font-weight:600;margin-bottom:4px}
.word-select p{font-size:12px;color:var(--text2);margin-bottom:14px}
.word-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.word-chip{padding:8px 14px;border-radius:var(--radius);border:1.5px solid var(--accent);background:var(--accent-light);color:var(--accent-dark);font-size:15px;cursor:pointer;transition:all .2s var(--ease);display:flex;align-items:center;gap:6px}
.word-chip:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(13,148,136,.15)}
.word-chip .word-chip-zh{font-family:'Noto Sans SC','Inter',sans-serif;font-weight:700;font-size:17px}
.word-chip .word-chip-en{font-size:11px;color:var(--text2)}
.word-chip.deselected{border-color:var(--border);background:#fff;color:var(--text3);opacity:.55}
.word-chip.deselected:hover{opacity:.7}
.word-chip.deselected .word-chip-en{color:var(--text3)}
.word-chip.already-added{border-color:var(--border);background:#f8fafc;color:var(--text3);cursor:default;opacity:.35}
.word-select-actions{display:flex;gap:10px}
.word-select-actions .btn{padding:10px 22px;font-size:13px}

/* Shimmer / loading */
.shimmer-container{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%}
.shimmer{width:80%;height:14px;border-radius:8px;background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.4s ease infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.shimmer:nth-child(2){width:60%}
.shimmer:nth-child(3){width:70%}
.processing-text{font-size:13px;color:var(--text2);margin-top:8px;animation:pulse 1s infinite alternate}
@keyframes pulse{from{opacity:.4}to{opacity:1}}

/* Toast — fixed position for native */
.toast{position:fixed;bottom:calc(var(--bottombar-h) + var(--sab) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,41,59,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;transition:all .35s var(--ease);z-index:200;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Vocabulary screen */
.vocab-controls{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s var(--ease);white-space:nowrap}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(13,148,136,.25)}
.chip:hover{background:var(--accent-light);border-color:rgba(13,148,136,.3)}
.chip.active:hover{background:var(--accent-dark)}

.vocab-list{padding:0;background:#fff;border-radius:var(--radius);margin:0 16px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--border);overflow:hidden}
.vocab-card{background:transparent;border-radius:0;padding:10px 14px;margin-bottom:0;box-shadow:none;border:none;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s var(--ease)}
.vocab-card:last-child{border-bottom:none}
.vocab-card:hover{background:var(--accent-light);transform:none;box-shadow:none}
.vocab-card-header{display:flex;align-items:center;gap:20px}
.vocab-chinese{font-family:'Noto Sans SC','Inter',sans-serif;font-size:20px;font-weight:700;line-height:1;color:var(--accent-dark);background:var(--accent-light);border-radius:10px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vocab-info{flex:1;min-width:0;padding-left:16px}
.vocab-pinyin{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:.2px}
.vocab-english{font-size:13px;color:var(--text);font-weight:500;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vocab-card-meta{display:flex;align-items:center;gap:8px;margin-top:4px}
.pos-chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.3px}
.pos-noun{background:#DBEAFE;color:#1D4ED8}
.pos-verb{background:#FEF3C7;color:#B45309}
.pos-adj{background:#F3E8FF;color:#7C3AED}
.pos-nv{background:var(--accent-light);color:var(--accent-dark)}
.wrong-badge{font-size:11px;color:#EF4444;font-weight:600}
.card-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.star-btn,.audio-btn{width:32px;height:32px;border:1px solid var(--border);background:#fff;border-radius:50%;cursor:pointer;transition:all .15s var(--ease);display:flex;align-items:center;justify-content:center;color:var(--text2)}
.star-btn:hover,.audio-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.star-btn.starred{color:#F59E0B}

/* Expanded card detail */
.vocab-detail{max-height:0;overflow:hidden;transition:max-height .35s var(--ease)}
.vocab-card.expanded .vocab-detail{max-height:600px}
.vocab-card.expanded{box-shadow:var(--shadow);border-color:rgba(13,148,136,.15)}
.detail-content{padding-top:14px;border-top:1px solid var(--border);margin-top:14px}
.example-sentence{margin-bottom:8px;padding:10px 12px;background:var(--bg);border-radius:10px}
.example-zh{font-family:'Noto Sans SC','Inter',sans-serif;font-size:15px;font-weight:500}
.example-py{font-size:12px;color:var(--text2);margin-top:2px}
.example-en{font-size:12px;color:var(--text2);font-style:italic;margin-top:2px}
.def-example{margin-top:5px;padding:5px 8px;border-left:2px solid var(--border);margin-left:2px}
.def-ex-zh{font-family:'Noto Sans SC','Inter',sans-serif;font-size:13px;font-weight:500;color:var(--text1);display:block}
.def-ex-en{font-size:11.5px;color:var(--text2);font-style:italic;display:block;margin-top:1px}
.related-section{margin-top:12px}
.related-section h5{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.related-chips{display:flex;gap:6px;flex-wrap:wrap}
.related-chip{padding:4px 12px;border-radius:var(--radius);background:var(--accent-light);color:var(--accent-dark);font-size:13px;cursor:pointer;border:none;transition:all .15s var(--ease);font-weight:500}
.related-chip:hover{background:rgba(13,148,136,.15)}
.btn-remove{width:100%;padding:8px;margin-top:14px;border:1px solid #FCA5A5;background:#fff;color:#EF4444;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s var(--ease)}
.btn-remove:hover{background:#FEF2F2;border-color:#EF4444}

/* Search bar */
.search-bar{padding:8px 20px}
.search-input{width:100%;padding:10px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all .2s var(--ease);background:#fff}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.search-bar.hidden{display:none}

/* Flashcard screen */
.fc-screen{padding:0px 20px 20px;display:flex;flex-direction:column;align-items:center;height:100%}
.fc-start{text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:40px}
.fc-start h2{font-size:22px;font-weight:700;letter-spacing:-.3px}
.fc-start p{color:var(--text2);font-size:14px}
.fc-options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.btn{padding:12px 24px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);font-family:'Inter',sans-serif}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(13,148,136,.25)}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,148,136,.3)}
.btn-primary:active{transform:translateY(0)}
.btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--border)}
.btn-outline:hover{background:var(--accent-light);border-color:rgba(13,148,136,.3)}

/* Progress bar */
.fc-progress{width:100%;margin-bottom:16px}
.fc-progress-text{font-size:12px;color:var(--text3);text-align:center;margin-bottom:6px;font-weight:500}
.fc-progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.fc-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .4s var(--ease);border-radius:2px}

/* Flashcard */
.fc-card-container{width:100%;max-width:320px;height:320px;perspective:1200px;margin:0 auto}
.fc-card{width:100%;height:100%;position:relative;transition:transform .55s var(--ease);transform-style:preserve-3d}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.05),0 4px 20px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.fc-back{transform:rotateY(180deg)}
.fc-front .fc-word{font-family:'Noto Sans SC','Inter',sans-serif;font-size:52px;font-weight:700;color:var(--text)}
.fc-front .audio-btn{margin-top:14px;color:var(--accent)}
.fc-pinyin-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:4px}
.fc-zh-answer{font-family:'Noto Sans SC','Inter',sans-serif;font-size:44px;font-weight:700;color:var(--text);margin-bottom:2px}
.fc-back .fc-pinyin{font-size:17px;color:var(--text3);font-weight:400;letter-spacing:.01em}
.fc-back .fc-meanings{font-size:12px;color:var(--text2);text-align:center;margin-top:8px;line-height:1.75;width:100%}
.fc-back .fc-meanings .def-num{color:var(--accent);font-weight:600;margin-right:3px}
.fc-back .fc-pos{margin-top:4px}
.fc-back .fc-example{font-size:11px;color:var(--text2);margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:10px;width:100%;line-height:1.5}
.fc-ex-zh{color:var(--text2);margin-bottom:2px}
.fc-ex-en{color:var(--text3);font-style:italic}
.fc-result-banner{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;display:none;align-items:center;justify-content:center;flex-shrink:0}
#fcCard[data-mode="en"] .fc-front .fc-word{font-family:'Inter',sans-serif;font-size:22px;font-weight:600;line-height:1.4}
#fcCard[data-mode="en"] .fc-front .audio-btn{display:none}
.fc-result-correct{display:flex;background:rgba(13,148,136,.15);color:var(--accent-dark)}
.fc-result-wrong{display:flex;background:rgba(239,68,68,.12);color:#DC2626}

.fc-nav{display:flex;justify-content:center;align-items:center;gap:16px;width:100%;margin-top:16px}
.fc-nav-btn{width:38px;height:38px;border:1.5px solid var(--border);background:#fff;border-radius:12px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease)}
.fc-nav-btn:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent)}
.fc-nav-btn:disabled{opacity:.25;cursor:not-allowed}
.fc-nav-counter{font-size:12px;color:var(--text3);font-weight:500}
.fc-buttons{display:flex;gap:12px;margin-top:16px;justify-content:center}
.btn-correct{background:var(--accent);color:#fff;padding:11px 24px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);font-family:'Inter',sans-serif;box-shadow:0 2px 8px rgba(13,148,136,.2);display:inline-flex;align-items:center;gap:7px}
.btn-correct:hover{background:var(--accent-dark);transform:translateY(-1px)}
.btn-pass{background:var(--orange);color:#fff;padding:11px 24px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);font-family:'Inter',sans-serif;box-shadow:0 2px 8px rgba(245,158,11,.2);display:inline-flex;align-items:center;gap:7px}
.btn-pass:hover{background:#D97706;transform:translateY(-1px)}
.btn-next{background:var(--accent);color:#fff;padding:12px 28px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:none;transition:all .2s var(--ease);font-family:'Inter',sans-serif;box-shadow:0 2px 8px rgba(13,148,136,.2)}
.btn-next:hover{background:var(--accent-dark);transform:translateY(-1px)}

/* Results */
.fc-results{text-align:center;padding-top:20px;width:100%}
.fc-results h2{font-size:22px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}
.donut-container{width:120px;height:120px;margin:0 auto 16px}
.donut-container svg{width:100%;height:100%}
.wrong-list{text-align:left;padding:0 8px;margin:16px 0}
.wrong-item{display:flex;justify-content:space-between;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;font-size:14px;border:1px solid rgba(0,0,0,.04)}
.fc-results .fc-buttons{justify-content:center;flex-wrap:wrap}

/* Scrollbar */
.app-screen::-webkit-scrollbar{width:3px}
.app-screen::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.app-screen::-webkit-scrollbar-track{background:transparent}

/* Selection */
::selection{background:rgba(13,148,136,.15);color:var(--text)}

/* Meaning toggle */
.vocab-list.meaning-hidden .vocab-english,
.vocab-list.meaning-hidden .vocab-pinyin{visibility:hidden}
.meaning-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 10px}
.meaning-toggle-label{font-size:12px;color:var(--text2);font-weight:500}
.toggle-switch{position:relative;display:inline-flex;align-items:center;cursor:pointer}
.toggle-switch input{position:absolute;opacity:0;width:0;height:0}
.toggle-track{width:36px;height:20px;background:var(--border);border-radius:10px;transition:background .2s var(--ease);position:relative;display:block}
.toggle-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s var(--ease);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch input:checked ~ .toggle-track{background:var(--accent)}
.toggle-switch input:checked ~ .toggle-track .toggle-thumb{transform:translateX(16px)}

/* Dictionary section */
.dict-section{margin-bottom:14px}
.dict-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);padding:6px 0}
.dict-spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.dict-entry{margin-bottom:12px}
.dict-pos-badge{font-size:10px;font-weight:600;color:var(--accent-dark);background:var(--accent-light);display:inline-block;padding:2px 8px;border-radius:8px;margin-bottom:6px}
.dict-def{font-size:12px;color:var(--text);padding:3px 0 3px 0;line-height:1.6;display:flex;gap:6px;align-items:baseline}
.dict-def-num{color:var(--text3);font-size:11px;font-weight:600;flex-shrink:0;min-width:14px}
.dict-def-pos{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:1px 5px;border-radius:4px;flex-shrink:0;margin-top:1px}
.dict-def-pos.pos-verb,.dict-def-pos.pos-v{background:#EDE9FE;color:#6D28D9}
.dict-def-pos.pos-noun,.dict-def-pos.pos-n{background:#FEF3C7;color:#92400E}
.dict-def-pos.pos-adj{background:#DBEAFE;color:#1E40AF}
.dict-def-pos.pos-adv{background:#FCE7F3;color:#9D174D}
.dict-def-pos.pos-mw{background:#D1FAE5;color:#065F46}
.dict-def-pos.pos-pron{background:#FECACA;color:#991B1B}

// ==================== CAPACITOR DETECTION ====================
const IS_NATIVE = !!(window.Capacitor?.isNativePlatform?.());

// ==================== NATIVE CAMERA ====================
async function captureNativePhoto(source) {
  try {
    const { Camera } = window.Capacitor.Plugins;
    const image = await Camera.getPhoto({
      quality: 85,
      allowEditing: false,
      resultType: 'base64',
      source: source // 'CAMERA' or 'PHOTOS'
    });
    const byteString = atob(image.base64String);
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
    const blob = new Blob([ab], { type: 'image/' + (image.format || 'jpeg') });
    const file = new File([blob], 'photo.' + (image.format || 'jpg'), { type: blob.type });
    processImageQueue([file]);
  } catch(e) {
    if (e && e.message && e.message.toLowerCase().includes('cancel')) return;
    showToast('Camera error: ' + (e?.message || 'unknown'));
  }
}

    if (zhVoice) u.voice = zhVoice;
    speechSynthesis.speak(u);
  }

function getPosClass(pos) {
  if (pos.includes('noun') && pos.includes('verb')) return 'pos-nv';
  if (pos.includes('noun')) return 'pos-noun';
  if (pos.includes('verb')) return 'pos-verb';
  if (pos.includes('adj')) return 'pos-adj';
  return 'pos-noun';
}

function findRelated(word) {
  const chars = [...word.zh];
  return vocab.filter(w => w.id !== word.id && chars.some(c => w.zh.includes(c)));
}

    t.classList.toggle('active', t.dataset.screen === name);

// ---- Real OCR path (Tesseract.js + CEDICT) ----
const wordCache = {};

let _imgQueue = [], _imgQueueIdx = 0, _collectedWords = [];

async function processImageQueue(files) {
  _imgQueue = files;
  _imgQueueIdx = 0;
  _collectedWords = [];
  await _processNext();
}

async function _processNext() {
  if (_imgQueueIdx >= _imgQueue.length) {
    resetUploadZone();
    if (_collectedWords.length) showWordSelection(_collectedWords);
    else showToast('No Chinese words found');
    return;
  }
  const file = _imgQueue[_imgQueueIdx];
  const total = _imgQueue.length;
  const current = _imgQueueIdx + 1;
  showUploadLoading();
  try {
    const { text, ocrWords } = await runTesseractOCR(file);
    const chineseBoxes = (ocrWords || []).filter(w =>
      /[\u4e00-\u9fff]/.test(w.text) && w.confidence > 25
    );
    if (chineseBoxes.length === 0) {
      if (total > 1) showToast(`Image ${current}/${total}: no Chinese words found`);
      else { resetUploadZone(); showToast('No Chinese words found in image'); return; }
      _imgQueueIdx++;
      await _processNext();
      return;
    }
    if (chineseBoxes.length === 1) {
      setProcessingText('Looking up vocabulary…');
      const words = await extractVocabFromText(text);
      _collectedWords.push(...words);
      if (total > 1) showToast(`Image ${current}/${total}: auto-extracted`);
      _imgQueueIdx++;
      await _processNext();
    } else {
      resetUploadZone();
      uploadZone.style.display = 'none';
      showImageAnnotation(file, chineseBoxes, current, total, async (selectedWords) => {
        _collectedWords.push(...selectedWords);
        _imgQueueIdx++;
        await _processNext();
      });
    }
  } catch (err) {
    resetUploadZone();
    showToast('OCR failed: ' + (err.message || 'unknown error'));
  }
}

function setProcessingText(msg) {
  const el = document.querySelector('.processing-text');
  if (el) el.textContent = msg;
}

async function runTesseractOCR(file) {
  const worker = await Tesseract.createWorker('chi_sim', 1, {
    logger: m => {
      if (m.status === 'loading tesseract core') setProcessingText('Loading OCR engine…');
      else if (m.status === 'loading language traineddata') setProcessingText('Loading Chinese model…');
      else if (m.status === 'recognizing text') setProcessingText(`Recognizing text… ${Math.round(m.progress * 100)}%`);
    }
  });
  const { data } = await worker.recognize(file);
  await worker.terminate();
  return { text: data.text, ocrWords: data.words };
}

function showImageAnnotation(file, ocrWords, current, total, onConfirm) {
  const annotDiv = document.getElementById('imageAnnotation');
  annotDiv.style.display = 'flex';
  const imageURL = URL.createObjectURL(file);
  const selected = new Set();
  const progressLabel = (total > 1) ? `<span style="font-size:11px;color:var(--text3);margin-left:8px">${current} / ${total}</span>` : '';
  const btnLabel = (total > 1 && current < total) ? 'Next →' : 'Continue →';

  const progressText = total > 1 ? `Image ${current} of ${total}` : '';
  annotDiv.innerHTML = `
    <div class="annot-topbar">
      <span class="annot-label">Circle the word you want to add</span>
    </div>
    <div class="annotation-canvas-wrap" id="annotCanvasWrap" style="display:none"><canvas id="annotCanvas"></canvas></div>
    <div class="annotation-bottom">
      ${progressText ? `<p class="annot-progress">${progressText}</p>` : ''}
      <div class="annot-btn-row">
        <button class="btn btn-outline" id="btnAnnotCancel2">Cancel</button>
        <button class="btn btn-outline" id="btnAnnotClear">Clear</button>
        <button class="btn btn-primary" id="btnAnnotConfirm" disabled>${btnLabel}</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('annotCanvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();

  img.onload = () => {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    document.getElementById('annotCanvasWrap').style.display = '';

    let drawing = false;
    let livePath = [];
    let flashPath = null;

    function redraw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      ocrWords.forEach((w, i) => {
        if (!selected.has(i)) return;
        ctx.fillStyle   = 'rgba(13,148,136,.30)';
        ctx.strokeStyle = '#0D9488';
        ctx.lineWidth   = Math.max(2, canvas.width * 0.003);
        const r = 6;
        const x = w.bbox.x0, y = w.bbox.y0,
              wd = w.bbox.x1 - w.bbox.x0, ht = w.bbox.y1 - w.bbox.y0;
        ctx.beginPath();
        ctx.roundRect(x, y, wd, ht, r);
        ctx.fill(); ctx.stroke();
      });
      function drawPath(pts, alpha) {
        if (pts.length < 2) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.strokeStyle = '#0D9488';
        ctx.lineWidth   = Math.max(3, canvas.width * 0.004);
        ctx.lineJoin    = 'round';
        ctx.lineCap     = 'round';
        ctx.setLineDash([]);
        ctx.stroke();
        ctx.fillStyle = 'rgba(13,148,136,.12)';
        ctx.fill();
        ctx.restore();
      }
      if (livePath.length) drawPath(livePath, 1);
      if (flashPath)       drawPath(flashPath.pts, flashPath.alpha);
    }

    function getXY(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width  / rect.width;
      const sy = canvas.height / rect.height;
      const src = e.touches ? e.touches[0] : e;
      return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
    }

    function commitPath() {
      if (livePath.length < 6) { livePath = []; redraw(); return; }
      const p2d = new Path2D();
      p2d.moveTo(livePath[0].x, livePath[0].y);
      livePath.forEach(p => p2d.lineTo(p.x, p.y));
      p2d.closePath();
      ocrWords.forEach((w, i) => {
        const cx = (w.bbox.x0 + w.bbox.x1) / 2;
        const cy = (w.bbox.y0 + w.bbox.y1) / 2;
        if (ctx.isPointInPath(p2d, cx, cy)) { selected.add(i); }
      });
      updateCount();
      flashPath = { pts: [...livePath], alpha: 1 };
      livePath = [];
      const tick = () => {
        flashPath.alpha -= 0.08;
        if (flashPath.alpha <= 0) { flashPath = null; redraw(); return; }
        redraw();
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }

    function updateCount() {
      const n = selected.size;
      const btn = document.getElementById('btnAnnotConfirm');
      btn.disabled = n === 0;
    }

    canvas.addEventListener('mousedown',  e => { drawing = true; livePath = [getXY(e)]; });
    canvas.addEventListener('mousemove',  e => { if (!drawing) return; livePath.push(getXY(e)); redraw(); });
    canvas.addEventListener('mouseup',    e => { if (!drawing) return; drawing = false; commitPath(); });
    canvas.addEventListener('mouseleave', e => { if (!drawing) return; drawing = false; commitPath(); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; livePath = [getXY(e)]; }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!drawing) return; livePath.push(getXY(e)); redraw(); }, { passive: false });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); if (!drawing) return; drawing = false; commitPath(); }, { passive: false });

    function doCancel() {
      annotDiv.style.display = 'none'; annotDiv.innerHTML = '';
      uploadZone.style.display = '';
      URL.revokeObjectURL(imageURL);
    }
    document.getElementById('btnAnnotCancel2').addEventListener('click', doCancel);

    document.getElementById('btnAnnotClear').addEventListener('click', () => {
      selected.clear(); livePath = []; flashPath = null; redraw(); updateCount();
    });

    document.getElementById('btnAnnotConfirm').addEventListener('click', async () => {
      const btn = document.getElementById('btnAnnotConfirm');
      btn.textContent = 'Looking up…'; btn.disabled = true;
      const texts = ocrWords.filter((_, i) => selected.has(i)).map(w => w.text);
      try {
        const vocabWords = await extractVocabFromTexts(texts);
        annotDiv.style.display = 'none'; annotDiv.innerHTML = '';
        uploadZone.style.display = '';
        URL.revokeObjectURL(imageURL);
        if (onConfirm) { onConfirm(vocabWords); return; }
        if (!vocabWords.length) { showToast('No words found in dictionary'); return; }
        showWordSelection(vocabWords);
      } catch {
        annotDiv.style.display = 'none'; uploadZone.style.display = '';
        URL.revokeObjectURL(imageURL); showToast('Lookup failed');
      }
    });

    redraw();
  };

  img.src = imageURL;
}

async function extractVocabFromText(rawText) {
  const sequences = [...new Set(rawText.match(/[\u4e00-\u9fff]+/g) || [])];
  return extractVocabFromTexts(sequences);
}

async function extractVocabFromTexts(texts) {
  const seen = new Set();
  const words = [];
  for (const seq of texts) {
    const segmented = await segmentChinese(seq);
    for (const zh of segmented) {
      if (seen.has(zh)) continue;
      seen.add(zh);
      const w = await lookupWordCEDICT(zh);
      if (w) words.push(w);
    }
  }
  return words;
}

async function segmentChinese(text) {
  const result = [];
  for (let i = 0; i < text.length; i++) {
    for (let len = 1; len <= Math.min(4, text.length - i); len++) {
      const candidate = text.substr(i, len);
      const w = await lookupWordCEDICT(candidate);
      if (w) result.push(candidate);
    }
  }
  return [...new Set(result)];
}

async function lookupWordCEDICT(zh) {
  if (zh in wordCache) return wordCache[zh];
  try {
    const url = `https://cdn.jsdelivr.net/gh/krmanik/cedict-json/v2/${encodeURIComponent(zh)}.json`;
    const res = await fetch(url);
    if (!res.ok) { wordCache[zh] = null; return null; }
    const data = await res.json();
    if (!data.definitions) { wordCache[zh] = null; return null; }
    const entries = Object.entries(data.definitions);
    if (!entries.length) { wordCache[zh] = null; return null; }
    entries.sort((a, b) => b[1].split(';').length - a[1].split(';').length);
    const [pinyin, defStr] = entries[0];
    const py = pinyinToTones(pinyin);
    const defs = defStr.split(';').map(s => s.trim())
      .filter(s => s.length > 1 && !s.startsWith('CL:') && !s.startsWith('see ') && !s.startsWith('variant of'));
    if (!defs.length) { wordCache[zh] = null; return null; }
    const hskPos = HSK_POS[zh] || null;
    const word = { zh, py, en: defs[0], pos: hskPos || 'other', ex: [] };
    wordCache[zh] = word;
    return word;
  } catch { wordCache[zh] = null; return null; }
}

// ==================== DICTIONARY ====================
const dictCache = {};

function pinyinToTones(p) {
  const MAP = {
    a:['ā','á','ǎ','à'], e:['ē','é','ě','è'], i:['ī','í','ǐ','ì'],
    o:['ō','ó','ǒ','ò'], u:['ū','ú','ǔ','ù'], v:['ǖ','ǘ','ǚ','ǜ'], ü:['ǖ','ǘ','ǚ','ǜ']
  };
  return p.split(' ').map(syl => {
    const t = parseInt(syl.slice(-1));
    if (!t || t < 1 || t > 5) return syl;
    const base = syl.slice(0, -1);
    if (t === 5) return base;
    let idx = -1;
    if (base.includes('a') || base.includes('e')) {
      idx = Math.max(base.lastIndexOf('a'), base.lastIndexOf('e'));
    } else if (base.includes('ou')) {
      idx = base.indexOf('o');
    } else {
      for (let i = base.length - 1; i >= 0; i--) {
        if ('aeiouüv'.includes(base[i])) { idx = i; break; }
      }
    }
    if (idx < 0) return base;
    const marked = MAP[base[idx]]?.[t - 1];
    return marked ? base.slice(0, idx) + marked + base.slice(idx + 1) : base;
  }).join('');
}

const exampleCache = {};
async function fetchExamples(zh) {
  if (zh in exampleCache) return exampleCache[zh];
  try {
    const base = `https://tatoeba.org/api_v0/search?from=cmn&to=eng&query=${encodeURIComponent(zh)}&limit=20`;
    const res = await fetch(`https://corsproxy.io/?${base}`);
    if (!res.ok) { exampleCache[zh] = null; return null; }
    const data = await res.json();
    const results = (data.results || []).flatMap(r => {
      const enTrans = (r.translations || []).flat().find(t => t.lang === 'eng');
      if (!enTrans) return [];
      return [{ zh: r.text, en: enTrans.text }];
    });
    exampleCache[zh] = results.length ? results : null;
    return exampleCache[zh];
  } catch { exampleCache[zh] = null; return null; }
}

const EX_STOP = new Set('a,an,the,of,to,in,on,at,is,be,are,was,were,has,have,had,do,does,did,it,its,and,or,but,for,with,by,from,as,used,form,that,this,which,when,what,how,they,their,there'.split(','));
function matchExamplesToDefs(defs, examples) {
  const used = new Set();
  return defs.map(def => {
    const words = def.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/)
      .filter(w => w.length > 3 && !EX_STOP.has(w));
    if (!words.length) return null;
    let best = null, bestScore = -1;
    examples.forEach((ex, idx) => {
      if (used.has(idx)) return;
      const score = words.filter(w => ex.en.toLowerCase().includes(w)).length;
      if (score > bestScore) { bestScore = score; best = idx; }
    });
    if (best !== null && bestScore > 0) { used.add(best); return examples[best]; }
    const fallback = examples.findIndex((_, idx) => !used.has(idx));
    if (fallback !== -1) { used.add(fallback); return examples[fallback]; }
    return null;
  });
}

function fetchDictionary(zh) {
  if (zh in dictCache) return dictCache[zh];
  const promise = (async () => {
    try {
      const url = `https://cdn.jsdelivr.net/gh/krmanik/cedict-json/v2/${encodeURIComponent(zh)}.json`;
      const res = await fetch(url);
      if (!res.ok) return null;
      const data = await res.json();
      if (!data.definitions) return null;
      let entries = Object.entries(data.definitions).map(([pinyin, defStr]) => {
        const definitions = defStr.split(';')
          .map(d => d.trim())
          .filter(d => d.length > 1 && !d.startsWith('CL:') && !d.startsWith('see ') && !d.startsWith('variant of') && !d.startsWith('abbr. for') && !d.startsWith('abbr. of') && !d.startsWith('Taiwan pr.'));
        return definitions.length ? { pinyin, partOfSpeech: pinyinToTones(pinyin), definitions } : null;
      }).filter(Boolean);
      if (!entries.length) return null;
      entries.sort((a, b) => b.definitions.length - a.definitions.length);
      const hasCommon = entries.some(e => e.pinyin[0] === e.pinyin[0].toLowerCase());
      if (hasCommon) entries = entries.filter(e => e.pinyin[0] === e.pinyin[0].toLowerCase());
      if (entries.length === 1) entries[0].partOfSpeech = null;
      return entries;
    } catch(e) { return null; }
  })();
  dictCache[zh] = promise;
  return promise;
}

function defPOS(zh, d) {
  const l = d.toLowerCase().trim().replace(/^\([^)]*\)\s*/, '');
  if (/\bmeasure word\b/.test(l)) return 'mw';
  if (/^to\s/.test(l)) return 'v';
  const hskCode = HSK_POS[zh];
  if (hskCode) return hskCode;
  return null;
}

function renderDictEntries(entries, zh, examplesPerDef) {
  if (!entries || !entries.length) return '';
  let globalDefIdx = 0;
  return entries.map((entry, entryIdx) => {
    const badge = entry.partOfSpeech
      ? `<span class="dict-pos-badge">${entry.partOfSpeech}</span>` : '';
    const lookupZh = entryIdx === 0 ? (zh || '') : '';
    const defs = entry.definitions.map((d, i) => {
      const pos = defPOS(lookupZh, d);
      const posLabel = pos ? (HSK_POS_DISPLAY[pos] || pos) : null;
      const posChip = posLabel ? `<span class="dict-def-pos pos-${pos}">${posLabel}</span>` : '';
      const ex = examplesPerDef ? examplesPerDef[globalDefIdx] : null;
      globalDefIdx++;
      const exHtml = ex ? `<div class="def-example"><span class="def-ex-zh">${ex.zh}</span><span class="def-ex-en">${ex.en}</span></div>` : '';
      return `<div class="dict-def"><span class="dict-def-num">${i+1}.</span>${posChip}${d}${exHtml}</div>`;
    }).join('');
    return `<div class="dict-entry">${badge}${defs}</div>`;
  }).join('');
}

function getFilteredVocab() {
  let list = [...vocab];
  const q = searchInput.value.toLowerCase().trim();
  if (q) {
    list = list.filter(w => w.zh.includes(q) || w.py.toLowerCase().includes(q) || w.en.toLowerCase().includes(q));
  }
  if (activeFilters.has('starred')) list = list.filter(w => w.starred);
  if (currentSort === 'recent') list.sort((a,b) => b.added - a.added);
  else if (currentSort === 'wrong') list.sort((a,b) => b.wrong - a.wrong);
  return list;
}

function renderVocabList() {
  const list = getFilteredVocab();
  if (list.length === 0) {
    vocabList.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);font-size:14px;font-weight:400">Upload screenshots to add vocabulary</div>';
    return;
  }
  vocabList.innerHTML = list.map(w => {
    const related = findRelated(w);
    const posClass = getPosClass(w.pos);
    return `
    <div class="vocab-card" data-id="${w.id}">
      <div class="vocab-card-header">
        <div class="vocab-chinese">${w.zh}</div>
        <div class="vocab-info">
          <div class="vocab-pinyin">${w.py}</div>
          <div class="vocab-english">${w.en}</div>
        </div>
        <div class="card-actions">
          <button class="audio-btn" data-zh="${w.zh}" onclick="event.stopPropagation();speak('${w.zh}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>
        </div>
      </div>
      <div class="vocab-detail">
        <div class="detail-content">
          <div class="dict-section" data-zh="${w.zh}"></div>
          <button class="btn-remove" onclick="event.stopPropagation();removeWord(${w.id})">Remove from list</button>
          ${related.length > 0 ? `
            <div class="related-section">
              <h5>Related words (shared characters)</h5>
              <div class="related-chips">
                ${related.map(r => `<button class="related-chip" onclick="event.stopPropagation();scrollToWord(${r.id})">${r.zh} ${r.py}</button>`).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  vocabList.querySelectorAll('.vocab-card').forEach(card => {
    card.addEventListener('click', async () => {
      card.classList.toggle('expanded');
      if (!card.classList.contains('expanded')) return;
      const dictEl = card.querySelector('.dict-section');
      if (!dictEl || dictEl.dataset.loaded) return;
      dictEl.dataset.loaded = 'true';
      const zh = dictEl.dataset.zh;
      dictEl.innerHTML = '<div class="dict-loading"><span class="dict-spinner"></span>Loading…</div>';
      const [entries, examples] = await Promise.all([
        fetchDictionary(zh),
        fetchExamples(zh)
      ]);
      let examplesPerDef = null;
      if (entries && examples) {
        const allDefs = entries.flatMap(e => e.definitions);
        examplesPerDef = matchExamplesToDefs(allDefs, examples);
      }
      const rendered = renderDictEntries(entries, zh, examplesPerDef);
      dictEl.innerHTML = rendered || `<div class="dict-fallback">${zh}: ${card.querySelector('.vocab-english').textContent}</div>`;
    });
  });
}

function buildDeck() {
  let pool = [...vocab];
  if (fcMode === 'starred') pool = pool.filter(w => w.starred);
  if (fcMode === 'recent') pool.sort((a,b) => b.added - a.added);
  else if (fcMode === 'wrong') pool.sort((a,b) => b.wrong - a.wrong);
  else shuffle(pool);
  return pool.slice(0, 10).map(w => ({ ...w, mode: Math.random() < 0.5 ? 'zh' : 'en' }));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

document.getElementById('fcStartBtn').addEventListener('click', startFlashcards);

function startFlashcards(wrongOnly) {
  if (wrongOnly && fcWrongList.length > 0) {
    fcDeck = [...fcWrongList];
    shuffle(fcDeck);
  } else {
    fcDeck = buildDeck();
  }
  if (fcDeck.length === 0) {
    showToast('No cards available! Add words first.');
    return;
  }
  fcIndex = 0; fcCorrect = 0; fcWrongList = [];
  document.getElementById('fcStart').style.display = 'none';
  document.getElementById('fcResults').style.display = 'none';
  document.getElementById('fcPlay').style.display = 'block';
  document.getElementById('fcCloseBtnRow').style.display = 'flex';
  showCard();
}

  if (fcAnswered) return;

    fcCorrect++;

  } else {
    const vw = vocab.find(v => v.id === w.id);
    if (vw) { vw.wrong++; saveVocab(); }
    fcWrongList.push(w);
    banner.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
