<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Snap &amp; Learn</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="firebase-app-compat.js"></script>
<script src="firebase-auth-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#0D9488;--accent-light:#F0FDFA;--accent-dark:#0F766E;
  --accent-muted:rgba(13,148,136,.08);
  --orange:#E5A117;--orange-light:#FFFDF5;
  --bg:#F0F5F4;--card:#fff;--text:#1A2332;--text2:#5E6B7A;--text3:#9BA5B1;
  --border:#E8ECF0;--shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);
  --shadow-lg:0 4px 16px rgba(0,0,0,.06),0 8px 32px rgba(0,0,0,.04);
  --radius:14px;
  --nav-h:56px;--topbar-h:48px;--bottombar-h:60px;
  --ease:cubic-bezier(.22,1,.36,1);
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}

html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
  height:100dvh;
}

/* App root — fills full height with safe-area padding at top */
#appRoot{
  display:flex;
  flex-direction:column;
  flex:1;
  overflow:hidden;
  padding-top:var(--sat);
}

/* App container — all screens live here, fills between top-bar and bottom-nav */
.app-container{
  flex:1;
  overflow:hidden;
  position:relative;
}

/* Screens */
.app-screen{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);transition:transform .3s var(--ease),opacity .3s var(--ease);will-change:transform,opacity}
.app-screen.hidden{display:none}
.app-screen.slide-left{transform:translateX(-100%);opacity:0}
.app-screen.slide-right{transform:translateX(100%);opacity:0}

/* Top bar */
.top-bar{height:var(--topbar-h);background:var(--bg);display:flex;align-items:center;padding:0 20px;font-size:17px;font-weight:700;letter-spacing:-.2px;position:sticky;top:0;z-index:40;border-bottom:none}
.top-bar .actions{margin-left:auto;display:flex;gap:4px}
.top-bar .icon-btn,.icon-btn{width:36px;height:36px;border:none;background:transparent;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s var(--ease);color:var(--text2)}
.top-bar .icon-btn:hover,.icon-btn:hover{background:var(--accent-muted);color:var(--accent)}

/* Bottom nav — safe area padding for Android home indicator */
.bottom-nav{
  height:calc(var(--bottombar-h) + var(--sab));
  padding-bottom:var(--sab);
  background:var(--bg);
  display:flex;
  border-top:none;
  z-index:50;
  flex-shrink:0;
}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;cursor:pointer;font-size:10px;font-weight:500;letter-spacing:.3px;color:var(--text3);transition:all .2s var(--ease);-webkit-tap-highlight-color:transparent;position:relative;text-transform:uppercase}
.nav-tab.active{color:var(--accent);font-weight:600}
.nav-tab.active .nav-icon{background:var(--accent-muted);border-radius:12px;padding:2px 12px}
.nav-tab .nav-icon{font-size:22px;display:flex;align-items:center;justify-content:center;height:26px;transition:all .2s var(--ease);padding:2px 12px;border-radius:12px}

/* Upload screen */
.upload-zone{margin:24px 20px;border:1.5px dashed var(--border);border-radius:20px;padding:52px 28px;text-align:center;transition:all .3s var(--ease);min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-light);transform:scale(1.005)}
.upload-zone .upload-icon{opacity:.25;color:var(--text3)}
.upload-zone p{color:var(--text3);font-size:13px;font-weight:400;line-height:1.5}
.upload-zone.processing .upload-icon{display:none}
.upload-native-btns{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;justify-content:center}

/* Image annotation — fixed overlay covering entire viewport */
.image-annotation{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;display:flex;flex-direction:column;background:#000;overflow:hidden;z-index:1000}
.annot-topbar{display:flex;align-items:center;justify-content:center;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));flex-shrink:0;background:transparent;position:relative}
.annot-close-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:none;background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:opacity .15s}
.annot-close-btn:hover{opacity:0.7}
.annot-label{font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);text-align:center}
.annotation-canvas-wrap{flex:1 1 0;min-height:0;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;padding:8px}
.annotation-canvas-wrap canvas{display:block;max-width:100%;max-height:100%;cursor:crosshair;touch-action:none}
.annotation-bottom{flex-shrink:0;padding:14px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.annot-progress{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;letter-spacing:.3px}
.annot-btn-row{display:flex;gap:10px}
.annot-btn-row .btn{flex:1;padding:12px;font-size:14px;font-weight:600;border-radius:12px}
.annot-btn-row .btn-outline{color:rgba(255,255,255,.85);border-color:rgba(255,255,255,0.2);background:transparent}
.annot-btn-row .btn-outline:hover{background:rgba(255,255,255,0.08)}
.annot-ocr-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none}
.annot-ocr-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.annot-ocr-status{font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);text-align:center}

.word-select{padding:20px}
.word-select h4{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text)}
.word-select p{font-size:12px;color:var(--text3);margin-bottom:14px}
.word-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.word-chip{padding:8px 14px;border-radius:12px;border:1px solid rgba(13,148,136,.2);background:var(--accent-muted);color:var(--accent-dark);font-size:15px;cursor:pointer;transition:all .2s var(--ease);display:flex;align-items:center;gap:6px}
.word-chip:hover{background:rgba(13,148,136,.1)}
.word-chip .word-chip-zh{font-family:'Noto Sans SC','Inter',sans-serif;font-weight:700;font-size:18px}
.word-chip .word-chip-en{font-size:11px;color:var(--text2)}
.word-chip.deselected{border-color:var(--border);background:#fff;color:var(--text3);opacity:.5}
.word-chip.deselected:hover{opacity:.65}
.word-chip.deselected .word-chip-en{color:var(--text3)}
.word-chip.already-added{border-color:var(--border);background:#f8fafc;color:var(--text3);cursor:default;opacity:.3}
.word-select-actions{display:flex;gap:10px}
.word-select-actions .btn{padding:10px 22px;font-size:13px}

/* Shimmer / loading */
.shimmer-container{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%}
.shimmer{width:80%;height:12px;border-radius:6px;background:linear-gradient(90deg,var(--border) 25%,var(--bg) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.6s ease infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.shimmer:nth-child(2){width:60%}
.shimmer:nth-child(3){width:70%}
.processing-text{font-size:12px;color:var(--text3);margin-top:8px;animation:pulse 1.2s infinite alternate}
@keyframes pulse{from{opacity:.35}to{opacity:.85}}

/* Toast — fixed position for native */
.toast{position:fixed;bottom:calc(var(--bottombar-h) + var(--sab) + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;padding:10px 20px;border-radius:12px;font-size:12px;font-weight:500;opacity:0;transition:all .3s var(--ease);z-index:200;white-space:nowrap;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.1);letter-spacing:.01em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Vocabulary screen */
.vocab-controls{padding:8px 20px;display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s var(--ease);white-space:nowrap;letter-spacing:.2px}
.chip.active{background:var(--accent-muted);color:var(--accent-dark);border-color:rgba(13,148,136,.2);box-shadow:none;font-weight:600}
.chip:hover{background:var(--accent-muted);border-color:rgba(13,148,136,.15)}
.chip.active:hover{background:rgba(13,148,136,.12)}

.vocab-list{padding:0;background:transparent;border-radius:0;margin:0 16px calc(16px + env(safe-area-inset-bottom));box-shadow:none;border:none;overflow:hidden;display:flex;flex-direction:column;gap:6px}
.swipe-wrap{position:relative;overflow:hidden;border-bottom:none;border-radius:14px}
.swipe-wrap:last-child{border-bottom:none}
.swipe-delete{position:absolute;right:0;top:0;bottom:0;width:80px;display:flex;align-items:center;justify-content:center;background:#EF4444;color:#fff;font-size:13px;font-weight:600;cursor:pointer;z-index:1;border-radius:0 14px 14px 0}
.vocab-card{position:relative;z-index:2;background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:0;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.04);cursor:pointer;transition:transform .25s cubic-bezier(.2,.8,.3,1),box-shadow .2s var(--ease)}
.vocab-card:hover{background:#fff;transform:none;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.vocab-card-header{display:flex;align-items:center;gap:12px}
.vocab-chinese{font-family:'Noto Sans SC','Inter',sans-serif;font-size:22px;font-weight:700;line-height:1;color:var(--text);background:var(--accent-muted);border-radius:12px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vocab-info{flex:1;min-width:0;padding-left:4px}
.vocab-pinyin{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.3px}
.vocab-english{font-size:13px;color:var(--text2);font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vocab-card-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.pos-chip{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.pos-noun{background:#EEF2FF;color:#4338CA}
.pos-verb{background:#FEF3C7;color:#B45309}
.pos-adj{background:#F3E8FF;color:#7C3AED}
.pos-nv{background:var(--accent-muted);color:var(--accent-dark)}
.wrong-badge{font-size:10px;color:var(--text3);font-weight:500;opacity:.7}
.date-header{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:16px 4px 6px;margin-top:4px}
.date-header:first-child{margin-top:0;padding-top:8px}
.card-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.star-btn,.audio-btn{width:30px;height:30px;border:none;background:transparent;border-radius:50%;cursor:pointer;transition:all .15s var(--ease);display:flex;align-items:center;justify-content:center;color:var(--text3)}
.star-btn:hover,.audio-btn:hover{background:var(--accent-muted);color:var(--accent)}
.star-btn.starred{color:var(--orange)}

/* Expanded card detail */
.vocab-detail{max-height:0;overflow:hidden;transition:max-height .35s var(--ease)}
.vocab-card.expanded .vocab-detail{max-height:600px}
.vocab-card.expanded{box-shadow:0 2px 12px rgba(0,0,0,.06);border-color:rgba(13,148,136,.1)}
.detail-content{padding-top:12px;border-top:1px solid var(--border);margin-top:12px}
.examples-section{margin-top:14px}
.examples-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.example-sentence{margin-bottom:8px;padding:10px 12px;background:var(--bg);border-radius:10px}
.example-zh{font-family:'Noto Sans SC','Inter',sans-serif;font-size:15px;font-weight:500}
.example-py{font-size:12px;color:var(--text2);margin-top:2px}
.example-en{font-size:12px;color:var(--text2);font-style:italic;margin-top:2px}
.def-example{margin-top:5px;padding:5px 8px;border-left:2px solid var(--border);margin-left:2px}
.def-ex-zh{font-family:'Noto Sans SC','Inter',sans-serif;font-size:13px;font-weight:500;color:var(--text1);display:block}
.def-ex-en{font-size:11.5px;color:var(--text2);font-style:italic;display:block;margin-top:1px}
.related-section{margin-top:12px}
.related-section h5{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.related-chips{display:flex;gap:6px;flex-wrap:wrap}
.related-chip{padding:4px 12px;border-radius:var(--radius);background:var(--accent-light);color:var(--accent-dark);font-size:13px;cursor:pointer;border:none;transition:all .15s var(--ease);font-weight:500}
.related-chip:hover{background:rgba(13,148,136,.15)}
.btn-remove{width:100%;padding:8px;margin-top:14px;border:1px solid rgba(220,38,38,.12);background:#fff;color:#DC2626;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s var(--ease)}
.btn-remove:hover{background:#FEF2F2;border-color:rgba(220,38,38,.25)}

/* Search bar */
.search-bar{padding:6px 20px}
.search-input{width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:all .2s var(--ease);background:#fff;color:var(--text)}
.search-input:focus{border-color:rgba(13,148,136,.3);box-shadow:0 0 0 3px rgba(13,148,136,.06)}
.search-input::placeholder{color:var(--text3)}
.search-bar.hidden{display:none}

/* Flashcard screen */
.fc-screen{padding:0px 20px 20px;display:flex;flex-direction:column;align-items:center;height:100%}
.fc-start{text-align:center;display:flex;flex-direction:column;align-items:center;gap:20px;padding-top:48px}
.fc-start h2{font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.fc-start p{color:var(--text3);font-size:13px}
.fc-options{display:flex;flex-wrap:nowrap;gap:5px;justify-content:center;padding:0 12px}
.fc-options .chip{font-size:10px;padding:5px 9px;white-space:nowrap;letter-spacing:0}
.btn{padding:11px 22px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);font-family:'Inter',sans-serif;letter-spacing:.01em}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(13,148,136,.2)}
.btn-primary:hover{background:var(--accent-dark);box-shadow:0 2px 8px rgba(13,148,136,.25)}
.btn-primary:active{transform:scale(.97);box-shadow:none}
.btn-outline{background:#fff;color:var(--text2);border:1.5px solid var(--border)}
.btn-outline:hover{background:var(--accent-muted);border-color:rgba(13,148,136,.2);color:var(--accent-dark)}

/* Progress bar */
.fc-progress{width:100%;margin-bottom:18px}
.fc-progress-text{font-size:11px;color:var(--text3);text-align:center;margin-bottom:6px;font-weight:500;letter-spacing:.3px}
.fc-progress-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.fc-progress-fill{height:100%;background:var(--accent);transition:width .4s var(--ease);border-radius:1px}

/* Flashcard */
.fc-card-container{width:100%;max-width:300px;height:340px;perspective:1200px;margin:0 auto}
.fc-card{width:100%;height:100%;position:relative;transition:transform .6s var(--ease);transform-style:preserve-3d}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:22px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;overflow:hidden}
.fc-back{transform:rotateY(180deg)}
.fc-front .fc-word{font-family:'Noto Sans SC','Inter',sans-serif;font-size:56px;font-weight:700;color:var(--text)}
.fc-front .audio-btn{margin-top:16px;color:var(--accent);border:none;background:var(--accent-muted)}
.fc-pinyin-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:4px}
.fc-zh-answer{font-family:'Noto Sans SC','Inter',sans-serif;font-size:44px;font-weight:700;color:var(--text);margin-bottom:2px}
.fc-back .fc-pinyin{font-size:16px;color:var(--text3);font-weight:400;letter-spacing:.02em}
.fc-back .fc-meanings{font-size:12px;color:var(--text2);text-align:center;margin-top:8px;line-height:1.8;width:100%}
.fc-back .fc-meanings .def-num{color:var(--accent);font-weight:600;margin-right:3px}
.fc-back .fc-pos{margin-top:4px}
.fc-back .fc-example{font-size:11px;color:var(--text2);margin-top:10px;padding:10px 14px;background:var(--bg);border-radius:12px;width:100%;line-height:1.6}
.fc-back .fc-example:empty{display:none}
.fc-ex-zh{color:var(--text2);margin-bottom:2px}
.fc-ex-en{color:var(--text3);font-style:italic}
.fc-result-banner{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;display:none;align-items:center;justify-content:center;flex-shrink:0}
#fcCard[data-mode="en"] .fc-front .fc-word{font-family:'Inter',sans-serif;font-size:20px;font-weight:600;line-height:1.5;color:var(--text2)}
#fcCard[data-mode="en"] .fc-front .audio-btn{display:none}
.fc-result-correct{display:flex;background:rgba(13,148,136,.12);color:var(--accent-dark)}
.fc-result-wrong{display:flex;background:rgba(220,38,38,.1);color:#DC2626}

.fc-nav{display:flex;justify-content:center;align-items:center;gap:20px;width:100%;margin-top:18px}
.fc-nav-btn{width:36px;height:36px;border:1.5px solid var(--border);background:#fff;border-radius:10px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease);color:var(--text3)}
.fc-nav-btn:hover:not(:disabled){background:var(--accent-muted);border-color:rgba(13,148,136,.2);color:var(--accent)}
.fc-nav-btn:disabled{opacity:.2;cursor:not-allowed}
.fc-nav-counter{font-size:12px;color:var(--text3);font-weight:500;min-width:48px;text-align:center}
.fc-buttons{display:flex;gap:10px;margin-top:18px;justify-content:center}
.btn-correct{background:var(--accent);color:#fff;padding:11px 22px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);font-family:'Inter',sans-serif;box-shadow:0 1px 4px rgba(13,148,136,.15);display:inline-flex;align-items:center;gap:6px}
.btn-correct:hover{background:var(--accent-dark)}
.btn-correct:active{transform:scale(.97)}
.btn-pass{background:#fff;color:var(--orange);padding:11px 22px;border:1.5px solid rgba(229,161,23,.25);border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);font-family:'Inter',sans-serif;box-shadow:none;display:inline-flex;align-items:center;gap:6px}
.btn-pass:hover{background:var(--orange-light);border-color:var(--orange)}
.btn-pass:active{transform:scale(.97)}
.btn-next{background:var(--accent);color:#fff;padding:11px 26px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;display:none;transition:all .2s var(--ease);font-family:'Inter',sans-serif;box-shadow:0 1px 4px rgba(13,148,136,.15)}
.btn-next:hover{background:var(--accent-dark)}
.btn-next:active{transform:scale(.97)}

/* Results */
.fc-results{text-align:center;padding-top:24px;width:100%}
.fc-results h2{font-size:20px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px;color:var(--text)}
.donut-container{width:110px;height:110px;margin:0 auto 16px}
.donut-container svg{width:100%;height:100%}
.wrong-list{text-align:left;padding:0 4px;margin:16px 0}
.wrong-item{display:flex;justify-content:space-between;padding:10px 14px;background:#fff;border-radius:12px;margin-bottom:6px;font-size:13px;border:1px solid rgba(0,0,0,.03);box-shadow:0 1px 2px rgba(0,0,0,.02)}

// ==================== CAPACITOR DETECTION ====================
const IS_NATIVE = !!(window.Capacitor?.isNativePlatform?.());

// Initialize Google Auth plugin for native
if (IS_NATIVE && window.Capacitor?.Plugins?.GoogleAuth) {

// ==================== NATIVE CAMERA ====================
async function captureNativePhoto(source) {
  try {
    const { Camera } = window.Capacitor.Plugins;
    const image = await Camera.getPhoto({
      quality: 85,
      allowEditing: false,
      resultType: 'base64',
      source: source // 'CAMERA' or 'PHOTOS'
    });
    const byteString = atob(image.base64String);
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
    const blob = new Blob([ab], { type: 'image/' + (image.format || 'jpeg') });
    const file = new File([blob], 'photo.' + (image.format || 'jpg'), { type: blob.type });
    processImageQueue([file]);
  } catch(e) {
    if (e && e.message && e.message.toLowerCase().includes('cancel')) return;
    showToast('Camera error: ' + (e?.message || 'unknown'));
  }
}

// ==================== PERSISTENCE ====================
function saveVocab() {
  try {
    localStorage.setItem('snaplearn_vocab', JSON.stringify(vocab));
    localStorage.setItem('snaplearn_addedIds', JSON.stringify([...addedIds]));
    localStorage.setItem('snaplearn_addOrder', String(addOrder));
  } catch(e) {}
}

function loadVocab() {
  try {
    const saved = localStorage.getItem('snaplearn_vocab');
    const savedIds = localStorage.getItem('snaplearn_addedIds');
    const savedOrder = localStorage.getItem('snaplearn_addOrder');
    if (saved) vocab = JSON.parse(saved);
    if (savedIds) addedIds = new Set(JSON.parse(savedIds));
    if (savedOrder) addOrder = parseInt(savedOrder) || 0;
  } catch(e) {}
}

// Refresh stored vocab meanings from the latest CEDICT data
async function refreshVocabMeanings() {
  if (!vocab.length) return;
  const dict = await loadCEDICT();
  let changed = false;
  for (const w of vocab) {
    const entry = dict[w.zh];
    if (entry && (entry.en !== w.en || entry.py !== w.py)) {
      w.en = entry.en;
      w.py = entry.py;
      changed = true;
    }
  }
  if (changed) { saveVocab(); renderVocabList(); }
}

    if (zhVoice) u.voice = zhVoice;
    speechSynthesis.speak(u);

}

function getPosClass(pos) {
  if (pos.includes('noun') && pos.includes('verb')) return 'pos-nv';
  if (pos.includes('noun')) return 'pos-noun';
  if (pos.includes('verb')) return 'pos-verb';
  if (pos.includes('adj')) return 'pos-adj';
  return 'pos-noun';
}

function findRelated(word) {
  const chars = [...word.zh];
  return vocab.filter(w => w.id !== word.id && chars.some(c => w.zh.includes(c)));
}

// ---- Real OCR path (Tesseract.js + CEDICT) ----
const wordCache = {};

let _imgQueue = [], _imgQueueIdx = 0, _collectedTexts = [];

async function processImageQueue(files) {
  _imgQueue = files;
  _imgQueueIdx = 0;
  _collectedTexts = [];
  await _processNext();
}

async function _processNext() {
  if (_imgQueueIdx >= _imgQueue.length) {
    // All images circled — now do one lookup for everything
    if (!_collectedTexts.length) {
      resetUploadZone();
      showToast('No Chinese words found');
      return;
    }
    showUploadLoading();
    setProcessingText('Looking up vocabulary…');
    try {
      const vocabWords = await extractVocabFromTexts(_collectedTexts);
      resetUploadZone();
      if (!vocabWords.length) { showToast('No words found in dictionary'); return; }
      showWordSelection(vocabWords);
    } catch(err) {
      console.error('Lookup failed:', err);
      resetUploadZone();
      showToast('Lookup failed — check network connection');
    }
    return;
  }
  const file = _imgQueue[_imgQueueIdx];
  const total = _imgQueue.length;
  const current = _imgQueueIdx + 1;

  // Show the image immediately with a loading overlay
  resetUploadZone();
  uploadZone.style.display = 'none';
  showImageAnnotation(file, [], current, total, null, true /* loadingMode */);

  try {
    const { text, ocrWords } = await runTesseractOCR(file);
    const chineseBoxes = (ocrWords || []).filter(w =>
      /[\u4e00-\u9fff]/.test(w.text) && w.confidence > 25
    );
    if (chineseBoxes.length === 0) {
      // Hide annotation, go back to upload
      const annotDiv = document.getElementById('imageAnnotation');
      annotDiv.style.display = 'none'; annotDiv.innerHTML = '';
      document.querySelector('.bottom-nav').style.display = '';
      uploadZone.style.display = '';
      if (total > 1) showToast(`Image ${current}/${total}: no Chinese words found`);
      else { showToast('No Chinese words found in image'); return; }
      _imgQueueIdx++;
      await _processNext();
      return;
    }
    if (chineseBoxes.length === 1) {
      const sequences = [...new Set(text.match(/[\u4e00-\u9fff]+/g) || [])];
      _collectedTexts.push(...sequences);
      const annotDiv = document.getElementById('imageAnnotation');
      annotDiv.style.display = 'none'; annotDiv.innerHTML = '';
      document.querySelector('.bottom-nav').style.display = '';
      uploadZone.style.display = '';
      if (total > 1) showToast(`Image ${current}/${total}: auto-extracted`);
      _imgQueueIdx++;
      await _processNext();
    } else {
      // OCR done — replace loading overlay with interactive annotation
      showImageAnnotation(file, chineseBoxes, current, total, async (selectedTexts) => {
        _collectedTexts.push(...selectedTexts);
        _imgQueueIdx++;
        await _processNext();
      });
    }
  } catch (err) {
    const annotDiv = document.getElementById('imageAnnotation');
    annotDiv.style.display = 'none'; annotDiv.innerHTML = '';
    document.querySelector('.bottom-nav').style.display = '';
    uploadZone.style.display = '';
    showToast('OCR failed: ' + (err.message || 'unknown error'));
  }
}

function setProcessingText(msg) {
  const el = document.querySelector('.processing-text');
  if (el) el.textContent = msg;
  const overlay = document.getElementById('annotOcrStatus');
  if (overlay) overlay.textContent = msg;
  const label = document.querySelector('.annot-label');
  if (label && document.getElementById('annotOcrOverlay')) label.textContent = msg;
}

async function runTesseractOCR(file) {
  const worker = await Tesseract.createWorker('chi_sim', 1, {
    logger: m => {
      if (m.status === 'loading tesseract core') setProcessingText('Loading OCR engine…');
      else if (m.status === 'loading language traineddata') setProcessingText('Loading Chinese model…');
      else if (m.status === 'recognizing text') setProcessingText(`Recognizing text… ${Math.round(m.progress * 100)}%`);
    }
  });
  const { data } = await worker.recognize(file);
  await worker.terminate();
  return { text: data.text, ocrWords: data.words };
}

function showImageAnnotation(file, ocrWords, current, total, onConfirm, loadingMode = false) {
  const annotDiv = document.getElementById('imageAnnotation');
  annotDiv.style.display = 'flex';
  document.querySelector('.bottom-nav').style.display = 'none';
  const imageURL = URL.createObjectURL(file);
  const selected = new Set();
  const btnLabel = (total > 1 && current < total) ? 'Next' : 'Continue';
  const progressText = total > 1 ? `Image ${current} of ${total}` : '';

  annotDiv.innerHTML = `
    <div class="annot-topbar">
      <button class="annot-close-btn" id="btnAnnotCancel2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <span class="annot-label">${loadingMode ? 'Analyzing image…' : 'Circle the word you want to add'}</span>
    </div>
    <div class="annotation-canvas-wrap" id="annotCanvasWrap" style="display:none;position:relative">
      <canvas id="annotCanvas"></canvas>
      ${loadingMode ? `<div class="annot-ocr-overlay" id="annotOcrOverlay"><div class="annot-ocr-spinner"></div><div class="annot-ocr-status" id="annotOcrStatus">Extracting Chinese text…</div></div>` : ''}
    </div>
    ${!loadingMode ? `<div class="annotation-bottom">
      ${progressText ? `<p class="annot-progress">${progressText}</p>` : ''}
      <div class="annot-btn-row">
        <button class="btn btn-outline" id="btnAnnotClear">Clear</button>
        <button class="btn btn-primary" id="btnAnnotConfirm">${btnLabel}</button>
      </div>
    </div>` : ''}
  `;

  const canvas = document.getElementById('annotCanvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();

  // Hoist state so button listeners can access it immediately
  let drawing = false;
  let livePath = [];
  let flashPath = null;
  let redrawRef = () => {};

  img.onload = () => {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    document.getElementById('annotCanvasWrap').style.display = '';

    function redraw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      ocrWords.forEach((w, i) => {
        if (!selected.has(i)) return;
        ctx.fillStyle   = 'rgba(13,148,136,.30)';
        ctx.strokeStyle = '#0D9488';
        ctx.lineWidth   = Math.max(2, canvas.width * 0.003);
        const r = 6;
        const x = w.bbox.x0, y = w.bbox.y0,
              wd = w.bbox.x1 - w.bbox.x0, ht = w.bbox.y1 - w.bbox.y0;
        ctx.beginPath();
        ctx.roundRect(x, y, wd, ht, r);
        ctx.fill(); ctx.stroke();
      });
      function drawPath(pts, alpha) {
        if (pts.length < 2) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.strokeStyle = '#0D9488';
        ctx.lineWidth   = Math.max(3, canvas.width * 0.004);
        ctx.lineJoin    = 'round';
        ctx.lineCap     = 'round';
        ctx.setLineDash([]);
        ctx.stroke();
        ctx.fillStyle = 'rgba(13,148,136,.12)';
        ctx.fill();
        ctx.restore();
      }
      if (livePath.length) drawPath(livePath, 1);
      if (flashPath)       drawPath(flashPath.pts, flashPath.alpha);
    }
    redrawRef = redraw;

    function getXY(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width  / rect.width;
      const sy = canvas.height / rect.height;
      const src = e.touches ? e.touches[0] : e;
      return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
    }

    function commitPath() {
      if (livePath.length < 6) { livePath = []; redraw(); return; }
      const p2d = new Path2D();
      p2d.moveTo(livePath[0].x, livePath[0].y);
      livePath.forEach(p => p2d.lineTo(p.x, p.y));
      p2d.closePath();
      ocrWords.forEach((w, i) => {
        const cx = (w.bbox.x0 + w.bbox.x1) / 2;
        const cy = (w.bbox.y0 + w.bbox.y1) / 2;
        if (ctx.isPointInPath(p2d, cx, cy)) { selected.add(i); }
      });
      updateCount();
      flashPath = { pts: [...livePath], alpha: 1 };
      livePath = [];
      const tick = () => {
        flashPath.alpha -= 0.08;
        if (flashPath.alpha <= 0) { flashPath = null; redraw(); return; }
        redraw();
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }

    function updateCount() {
      // Button always enabled — user can skip circling
    }

    canvas.addEventListener('mousedown',  e => { drawing = true; livePath = [getXY(e)]; });
    canvas.addEventListener('mousemove',  e => { if (!drawing) return; livePath.push(getXY(e)); redraw(); });
    canvas.addEventListener('mouseup',    e => { if (!drawing) return; drawing = false; commitPath(); });
    canvas.addEventListener('mouseleave', e => { if (!drawing) return; drawing = false; commitPath(); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; livePath = [getXY(e)]; }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!drawing) return; livePath.push(getXY(e)); redraw(); }, { passive: false });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); if (!drawing) return; drawing = false; commitPath(); }, { passive: false });

    redraw();
  };

  // Attach button listeners immediately — do not wait for img.onload
  function doCancel() {
    annotDiv.style.display = 'none'; annotDiv.innerHTML = '';
    uploadZone.style.display = '';
    document.querySelector('.bottom-nav').style.display = '';
    URL.revokeObjectURL(imageURL);
  }
  document.getElementById('btnAnnotCancel2').addEventListener('click', doCancel);

  if (!loadingMode) {
    document.getElementById('btnAnnotClear').addEventListener('click', () => {
      if (!selected.size && !livePath.length && !flashPath) return;
      selected.clear(); livePath = []; flashPath = null; redrawRef();
    });

    document.getElementById('btnAnnotConfirm').addEventListener('click', async () => {
      const texts = ocrWords.filter((_, i) => selected.has(i)).map(w => w.text);
      annotDiv.style.display = 'none'; annotDiv.innerHTML = '';
      uploadZone.style.display = '';
      document.querySelector('.bottom-nav').style.display = '';
      URL.revokeObjectURL(imageURL);
      if (onConfirm) { await onConfirm(texts); return; }
      showUploadLoading();
      setProcessingText('Looking up vocabulary…');
      try {
        const vocabWords = await extractVocabFromTexts(texts);
        resetUploadZone();
        if (!vocabWords.length) { showToast('No words found in dictionary'); return; }
        showWordSelection(vocabWords);
      } catch(err) {
        console.error('Lookup failed:', err);
        resetUploadZone();
        showToast('Lookup failed — check network connection');
      }
    });
  }

  img.src = imageURL;
}

async function extractVocabFromText(rawText) {
  const sequences = [...new Set(rawText.match(/[\u4e00-\u9fff]+/g) || [])];
  return extractVocabFromTexts(sequences);
}

// Local CEDICT dictionary — loaded once, instant lookups
let _cedict = null;
async function loadCEDICT() {
  if (_cedict) return _cedict;
  const res = await fetch('cedict.json');
  _cedict = await res.json();
  return _cedict;
}

async function extractVocabFromTexts(texts) {
  const dict = await loadCEDICT();
  const seen = new Set();
  const words = [];
  for (const seq of texts) {
    const segmented = segmentChinese(seq, dict);
    for (const zh of segmented) {
      if (seen.has(zh)) continue;
      seen.add(zh);
      const entry = dict[zh];
      if (entry) {
        const hskPos = HSK_POS[zh] || null;
        words.push({ zh, py: entry.py, en: entry.en, pos: hskPos || 'other', ex: [] });
      }
    }
  }
  return words;
}

function segmentChinese(text, dict) {
  // Greedy max-length matching
  const result = [];
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (let len = Math.min(4, text.length - i); len >= 2; len--) {
      const candidate = text.substr(i, len);
      if (dict[candidate]) {
        result.push(candidate);
        i += len;
        matched = true;
        break;
      }
    }
    if (!matched) {
      const ch = text[i];
      if (dict[ch]) result.push(ch);
      i++;
    }
  }
  return [...new Set(result)];
}

const dictCache = {};

function pinyinToTones(p) {
  const MAP = {
    a:['ā','á','ǎ','à'], e:['ē','é','ě','è'], i:['ī','í','ǐ','ì'],
    o:['ō','ó','ǒ','ò'], u:['ū','ú','ǔ','ù'], v:['ǖ','ǘ','ǚ','ǜ'], ü:['ǖ','ǘ','ǚ','ǜ']
  };
  return p.split(' ').map(syl => {
    const t = parseInt(syl.slice(-1));
    if (!t || t < 1 || t > 5) return syl;
    const base = syl.slice(0, -1);
    if (t === 5) return base;
    let idx = -1;
    if (base.includes('a') || base.includes('e')) {
      idx = Math.max(base.lastIndexOf('a'), base.lastIndexOf('e'));
    } else if (base.includes('ou')) {
      idx = base.indexOf('o');
    } else {
      for (let i = base.length - 1; i >= 0; i--) {
        if ('aeiouüv'.includes(base[i])) { idx = i; break; }
      }
    }
    if (idx < 0) return base;
    const marked = MAP[base[idx]]?.[t - 1];
    return marked ? base.slice(0, idx) + marked + base.slice(idx + 1) : base;
  }).join('');
}

const exampleCache = {};

const EX_STOP = new Set('a,an,the,of,to,in,on,at,is,be,are,was,were,has,have,had,do,does,did,it,its,and,or,but,for,with,by,from,as,used,form,that,this,which,when,what,how,they,their,there'.split(','));
function matchExamplesToDefs(defs, examples) {
  const used = new Set();
  return defs.map(def => {
    const words = def.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/)
      .filter(w => w.length > 3 && !EX_STOP.has(w));
    if (!words.length) return null;
    let best = null, bestScore = -1;
    examples.forEach((ex, idx) => {
      if (used.has(idx)) return;
      const score = words.filter(w => ex.en.toLowerCase().includes(w)).length;
      if (score > bestScore) { bestScore = score; best = idx; }
    });
    if (best !== null && bestScore > 0) { used.add(best); return examples[best]; }
    const fallback = examples.findIndex((_, idx) => !used.has(idx));
    if (fallback !== -1) { used.add(fallback); return examples[fallback]; }
    return null;
  });
}

async function fetchDictionary(zh) {
  if (zh in dictCache) return dictCache[zh];
  const dict = await loadCEDICT();
  const entry = dict[zh];
  if (!entry) { dictCache[zh] = null; return null; }
  const defs = entry.defs || [entry.en];
  const result = [{ pinyin: entry.py, partOfSpeech: null, definitions: defs }];
  dictCache[zh] = result;
  return result;
}

function defPOS(zh, d) {
  const l = d.toLowerCase().trim().replace(/^\([^)]*\)\s*/, '');
  if (/\bmeasure word\b/.test(l)) return 'mw';
  if (/^to\s/.test(l)) return 'v';
  const hskCode = HSK_POS[zh];
  if (hskCode) return hskCode;
  return null;
}

function renderDictEntries(entries, zh, examples) {
  if (!entries || !entries.length) return '';
  const defsHtml = entries.map(entry => {
    const badge = entry.partOfSpeech
      ? `<span class="dict-pos-badge">${entry.partOfSpeech}</span>` : '';
    const defs = entry.definitions.map((d, i) => {
      const pos = defPOS(zh || '', d);
      const posLabel = pos ? (HSK_POS_DISPLAY[pos] || pos) : null;
      const posChip = posLabel ? `<span class="dict-def-pos pos-${pos}">${posLabel}</span>` : '';
      return `<div class="dict-def"><span class="dict-def-num">${i+1}.</span>${posChip}${d}</div>`;
    }).join('');
    return `<div class="dict-entry">${badge}${defs}</div>`;
  }).join('');

  const exHtml = examples && examples.length ? `
    <div class="examples-section">
      <div class="examples-label">Example sentences</div>
      ${examples.map(ex => `
        <div class="example-sentence">
          <div class="example-zh">${ex.zh}</div>
          <div class="example-en">${ex.en}</div>
        </div>`).join('')}
    </div>` : '';

  return defsHtml + exHtml;
}

    });
  });

// Swipe-to-delete handler
function initSwipeHandlers() {
  let activeSwipe = null;
  vocabList.addEventListener('touchstart', e => {
    const wrap = e.target.closest('.swipe-wrap');
    if (!wrap) return;
    const card = wrap.querySelector('.vocab-card');
    // Close any previously open swipe
    if (activeSwipe && activeSwipe !== wrap) {
      activeSwipe.querySelector('.vocab-card').style.transform = '';
      activeSwipe = null;
    }
    const touch = e.touches[0];
    wrap._swipeStartX = touch.clientX;
    wrap._swipeStartY = touch.clientY;
    wrap._swiping = false;
    wrap._swipeOpen = card.style.transform && card.style.transform !== 'none';
    card.style.transition = 'none';
  }, { passive: true });

  vocabList.addEventListener('touchmove', e => {
    const wrap = e.target.closest('.swipe-wrap');
    if (!wrap || wrap._swipeStartX === undefined) return;
    const touch = e.touches[0];
    const dx = touch.clientX - wrap._swipeStartX;
    const dy = touch.clientY - wrap._swipeStartY;
    // Only lock to horizontal if clearly more horizontal than vertical
    if (!wrap._swiping && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
      wrap._swiping = Math.abs(dx) > Math.abs(dy);
      if (!wrap._swiping) { wrap._swipeStartX = undefined; return; } // let scroll happen
    }
    if (!wrap._swiping) return;
    e.preventDefault();
    const card = wrap.querySelector('.vocab-card');
    const openOffset = wrap._swipeOpen ? -80 : 0;
    const offset = Math.min(0, Math.max(-80, openOffset + dx));
    card.style.transform = `translateX(${offset}px)`;
  }, { passive: false });

  vocabList.addEventListener('touchend', e => {
    const wrap = e.target.closest('.swipe-wrap');
    if (!wrap || wrap._swipeStartX === undefined) return;
    const card = wrap.querySelector('.vocab-card');
    card.style.transition = '';
    const touch = e.changedTouches[0];
    const dx = touch.clientX - wrap._swipeStartX;
    if (wrap._swipeOpen) {
      // Was open: close if swiped right, otherwise stay open
      if (dx > 30) { card.style.transform = ''; activeSwipe = null; }
      else { card.style.transform = 'translateX(-80px)'; activeSwipe = wrap; }
    } else {
      // Was closed: open if swiped left enough
      if (dx < -40) { card.style.transform = 'translateX(-80px)'; activeSwipe = wrap; }
      else { card.style.transform = ''; }
    }
    wrap._swipeStartX = undefined;
    wrap._swiping = false;
  }, { passive: true });

  // Close swipe on tap elsewhere
  document.addEventListener('touchstart', e => {
    if (activeSwipe && !activeSwipe.contains(e.target)) {
      activeSwipe.querySelector('.vocab-card').style.transform = '';
      activeSwipe = null;
    }
  }, { passive: true });
}

function buildDeck() {
  let pool = [...vocab];
  if (fcMode === 'starred') pool = pool.filter(w => w.starred);
  if (fcMode === 'recent') pool.sort((a,b) => b.added - a.added);
  else if (fcMode === 'wrong') pool.sort((a,b) => b.wrong - a.wrong);
  else shuffle(pool);
  return pool.slice(0, 10).map(w => ({ ...w, mode: Math.random() < 0.5 ? 'zh' : 'en' }));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startFlashcards(wrongOnly) {
  if (wrongOnly && fcWrongList.length > 0) {
    fcDeck = [...fcWrongList];
    shuffle(fcDeck);
  } else {
    fcDeck = buildDeck();
  }
  if (fcDeck.length === 0) {
    showToast('No cards available! Add words first.');
    return;
  }
  fcIndex = 0; fcCorrect = 0; fcWrongList = [];
  document.getElementById('fcStart').style.display = 'none';
  document.getElementById('fcResults').style.display = 'none';
  document.getElementById('fcPlay').style.display = 'block';
  document.getElementById('fcCloseBtnRow').style.display = 'flex';
  showCard();
}

function showCard(startFlipped) {
  fcFlipped = false; fcAnswered = false;
  const w = fcDeck[fcIndex];
  const mode = w.mode || 'zh';
  const card = document.getElementById('fcCard');
  card.dataset.mode = mode;
  card.classList.remove('flipped');

  if (mode === 'zh') {
    document.getElementById('fcWord').textContent = w.zh;
  } else {
    document.getElementById('fcWord').textContent = w.en;
  }

  document.getElementById('fcPinyin').textContent = w.py;
  document.getElementById('fcBanner').innerHTML = '';
  document.getElementById('fcBanner').className = 'fc-result-banner';
  const ex = w.ex?.[0];
  document.getElementById('fcExample').innerHTML = ex
    ? `<div class="fc-ex-zh">${ex.zh}</div><div class="fc-ex-en">${ex.en}</div>` : '';

  if (mode === 'zh') {
    document.getElementById('fcZhAnswer').style.display = 'none';
    document.getElementById('fcMeanings').textContent = w.en;
    document.getElementById('fcPos').style.display = '';
    document.getElementById('fcPos').innerHTML = `<span class="pos-chip ${getPosClass(w.pos)}">${w.pos || ''}</span>`;
    fetchDictionary(w.zh).then(entries => {
      if (!entries || fcDeck[fcIndex]?.id !== w.id) return;
      const defs = entries.flatMap(e => e.definitions).slice(0, 4);
      document.getElementById('fcMeanings').innerHTML = defs.map((d, i) =>
        `<div><span class="def-num">${i + 1}.</span>${d}</div>`).join('');
    });
  } else {
    document.getElementById('fcZhAnswer').style.display = '';
    document.getElementById('fcZhAnswer').textContent = w.zh;
    document.getElementById('fcPos').style.display = '';
    document.getElementById('fcPos').innerHTML = `<span class="pos-chip ${getPosClass(w.pos)}">${w.pos || ''}</span>`;
    // Show all meanings on the answer side
    document.getElementById('fcMeanings').textContent = w.en;
    fetchDictionary(w.zh).then(entries => {
      if (!entries || fcDeck[fcIndex]?.id !== w.id) return;
      const defs = entries.flatMap(e => e.definitions).slice(0, 5);
      document.getElementById('fcMeanings').innerHTML = defs.map((d, i) =>
        `<div><span class="def-num">${i + 1}.</span>${d}</div>`).join('');
    });
    // Show more meanings as the question too
    loadCEDICT().then(dict => {
      if (!dict || fcDeck[fcIndex]?.id !== w.id) return;
      const entry = dict[w.zh];
      if (entry && entry.defs && entry.defs.length > 1) {
        document.getElementById('fcWord').textContent = entry.defs.slice(0, 3).join('; ');
      }
    });
  }

  document.getElementById('fcProgressText').textContent = `${fcIndex + 1} / ${fcDeck.length}`;
  document.getElementById('fcProgressFill').style.width = `${(fcIndex / fcDeck.length) * 100}%`;
  document.getElementById('fcNavCounter').textContent = `${fcIndex + 1} / ${fcDeck.length}`;

  if (startFlipped) {
    fcAnswered = true;
    card.classList.add('flipped');
    document.querySelector('.fc-nav').style.display = 'flex';
    document.getElementById('btnKnow').style.display = 'none';
    document.getElementById('btnPass').style.display = 'none';
    document.getElementById('btnPrev').disabled = (fcIndex === 0);
    document.getElementById('btnSkipNext').disabled = false;
  } else {
    document.querySelector('.fc-nav').style.display = 'none';
    document.getElementById('btnKnow').style.display = '';
    document.getElementById('btnPass').style.display = '';
    document.getElementById('btnPrev').disabled = (fcIndex === 0);

}

function answerCard(correct) {
  if (fcAnswered) return;
  fcAnswered = true;
  const w = fcDeck[fcIndex];
  const banner = document.getElementById('fcBanner');
  if (correct) {
    fcCorrect++;
    banner.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    banner.className = 'fc-result-banner fc-result-correct';
  } else {
    const vw = vocab.find(v => v.id === w.id);
    if (vw) { vw.wrong++; vw.ts = Date.now(); saveVocab(); }
    fcWrongList.push(w);
    banner.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    banner.className = 'fc-result-banner fc-result-wrong';
  }
  document.getElementById('fcCard').classList.add('flipped');
  document.getElementById('btnKnow').style.display = 'none';
  document.getElementById('btnPass').style.display = 'none';
  const nav = document.querySelector('.fc-nav');
  nav.style.display = 'flex';
  document.getElementById('btnPrev').disabled = (fcIndex === 0);
  document.getElementById('btnSkipNext').disabled = false;
}

function showResults() {
  document.getElementById('fcPlay').style.display = 'none';
  document.getElementById('fcCloseBtnRow').style.display = 'none';
  const total = fcDeck.length;
  const pct = Math.round((fcCorrect / total) * 100);
  const circumference = 2 * Math.PI * 45;
  const offset = circumference - (pct / 100) * circumference;

  let html = `
    <h2>You got ${fcCorrect}/${total} correct!</h2>
    <div class="donut-container">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="none" stroke="#e0e0e0" stroke-width="8"/>
        <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="8"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
          stroke-linecap="round" transform="rotate(-90 50 50)"
          style="transition:stroke-dashoffset 1s"/>
        <text x="50" y="54" text-anchor="middle" font-size="18" font-weight="700" fill="var(--text)">${pct}%</text>
      </svg>
    </div>
  `;
  if (fcWrongList.length > 0) {
    html += '<h4 style="text-align:left;font-size:13px;color:var(--text2);margin:8px 0">Words to review:</h4><div class="wrong-list">';
    fcWrongList.forEach(w => {
      html += `<div class="wrong-item"><span>${w.zh} (${w.py})</span><span>${w.en}</span></div>`;
    });
    html += '</div>';
  }
  html += `
    <div class="fc-buttons">
      <button class="btn btn-primary" onclick="resetFlashcards()">Practice Again</button>
      ${fcWrongList.length > 0 ? '<button class="btn btn-outline" onclick="practiceWrong()">Practice Wrong Words</button>' : ''}
    </div>
  `;
  const resultsEl = document.getElementById('fcResults');
  resultsEl.innerHTML = html;
  resultsEl.style.display = 'block';
}

// --- Firestore sync helpers ---
function vocabCollectionRef() {
  if (!currentUser) return null;
  return db.collection('users').doc(currentUser.uid).collection('vocab');
}

async function uploadVocabToFirestore() {
  const ref = vocabCollectionRef();
  if (!ref) return;
  try {
    // Firestore batches limited to 500 ops; chunk if needed
    for (let i = 0; i < vocab.length; i += 450) {
      const batch = db.batch();
      const chunk = vocab.slice(i, i + 450);
      for (const w of chunk) {
        batch.set(ref.doc(w.zh), { ...w, ts: w.ts || w.id || Date.now() });
      }
      await batch.commit();
    }
  } catch(e) { console.error('Firestore upload error:', e); }
}

async function fetchAndMergeFromFirestore() {
  const ref = vocabCollectionRef();
  if (!ref) return;
  try {
    const snapshot = await ref.get();
    const remoteWords = [];
    snapshot.forEach(doc => remoteWords.push(doc.data()));
    // Build map of local vocab by zh
    const localMap = {};
    for (const w of vocab) {
      localMap[w.zh] = w;
    }
    // Merge: keep newer version by ts (falling back to id)
    let changed = false;
    for (const rw of remoteWords) {
      const localW = localMap[rw.zh];
      const remoteTs = rw.ts || rw.id || 0;
      if (!localW) {
        // Remote word not in local — add it
        vocab.push(rw);
        addedIds.add(rw.zh);
        if (rw.added && rw.added > addOrder) addOrder = rw.added;
        changed = true;
      } else {
        const localTs = localW.ts || localW.id || 0;
        if (remoteTs > localTs) {
          // Remote is newer — update local
          Object.assign(localW, rw);
          changed = true;
        }
      }
    }
    if (changed) {
      saveVocabLocal();
      renderVocabList();
    }
    // Upload any local-only words to Firestore
    const remoteZhSet = new Set(remoteWords.map(w => w.zh));
    const localOnly = vocab.filter(w => !remoteZhSet.has(w.zh));
    if (localOnly.length > 0) {
      const batch = db.batch();
      for (const w of localOnly) {
        batch.set(ref.doc(w.zh), { ...w, ts: w.ts || w.id || Date.now() });
      }
      await batch.commit();
    }
  } catch(e) { console.error('Firestore merge error:', e); }
}

function syncWordToFirestore(word) {
  const ref = vocabCollectionRef();
  if (!ref) return;
  const data = { ...word, ts: Date.now() };
  ref.doc(word.zh).set(data).catch(e => console.error('Firestore sync error:', e));
}

function deleteWordFromFirestore(zh) {
  const ref = vocabCollectionRef();
  if (!ref) return;
  ref.doc(zh).delete().catch(e => console.error('Firestore delete error:', e));
}

// --- Override saveVocab to also sync to Firestore ---
// Keep a local-only version for merge operations (avoids infinite loop)
function saveVocabLocal() {
  try {
    localStorage.setItem('snaplearn_vocab', JSON.stringify(vocab));
    localStorage.setItem('snaplearn_addedIds', JSON.stringify([...addedIds]));
    localStorage.setItem('snaplearn_addOrder', String(addOrder));
  } catch(e) {}
}
// Override the original saveVocab
saveVocab = function() {
  saveVocabLocal();
  // Sync all changed words (batch upload for simplicity)
  if (currentUser) {
    uploadVocabToFirestore();
  }
};
